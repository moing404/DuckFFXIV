<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常興趣 - Final Fantasy XIV</title>
    <style>
        /* 網頁整體樣式設定 */
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            /* 網頁主背景改為柔和的漸變色 */
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh; /* 確保漸變背景能填滿整個螢幕高度 */
            color: #333;
        }

        /* 頂部橫幅設計 */
        header {
            /* 標題區塊改為深藍到亮藍的漸變色 */
            background: linear-gradient(to bottom, #001f3f, #3a1c71, #d76d77);
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            letter-spacing: 2px;
        }

        h2 {
            margin: 1rem 0 0 0;
            font-weight: 300;
            color: #e0f2fe; /* 微調副標題顏色以搭配漸變背景 */
            font-size: 1.5rem;
        }

        /* 內容區塊設計 */
        main {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .content-card {
            background: white;
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 30px #828b891a; /* 加深一點陰影讓卡片更立體 */
            margin-bottom: 2rem;
        }

        h3 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 0.5rem;
            display: inline-block;
        }

        ul {
            padding-left: 1.5rem;
        }

        li {
            margin-bottom: 1rem;
        }

        code {
            background-color: #f1f2f6;
            color: #e74c3c;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;

        }
       
        .navbar {
    background: rgba(0, 0, 0, 0.3); /* 半透明背景 */
    padding: 1rem;
    text-align: center;
    position: sticky; /* 讓你捲動時導航列會黏在最上方 */
    top: 0;
    z-index: 1000;
}

.navbar ul {
    list-style: none; /* 移除點點 */
    margin: 0;
    padding: 0;
}

.navbar li {
    display: inline; /* 讓連結變成橫向排列 */
    margin: 0 15px;
}

.navbar a {
    color: white;
    text-decoration: none; /* 移除底線 */
    font-weight: bold;
    font-size: 1.1rem;
    transition: color 0.3s;
}

.navbar a:hover {
    color: #eadd28; /* 滑鼠移上去變顏色 */
}
    </style>
</head>
<body>

    <header>
        <h1>母鴨 IN FINAL FANTASY XIV</h1>
        <h2>我在艾歐澤亞的生活日常</h2>
    </header>

<main>
    <div class="hero-section" style="text-align: center; padding: 100px 0;">
        
        <h1 style="color: white; margin-top: 20px;">這是頁首：Ｄ</h1>
        
        <a href="content.html" style="display: inline-block; padding: 15px 30px; background: #b1db34; color: white; text-decoration: none; border-radius: 5px; margin-top: 20px;">
            按我！
        </a>
    </div>
</main>

</body>
</html>
